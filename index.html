        .hidden { display: none !important; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

            const screens = ['screen-menu', 'screen-meds', 'screen-pflege', 'screen-infusion', 'screen-neuro', 'screen-symptome'];
            screens.forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
            if(id === 'screen-menu') document.getElementById('luqui-bubble').innerText = phrases.welcome;
        }

        function search(type) {
            let db, listId, inputId;
            if (type === 'med') { db = dbMeds; listId = 'list-m'; inputId = 'searchM'; }
            else if (type === 'pflege') { db = dbPflege; listId = 'list-p'; inputId = 'searchP'; }

            else if (type === 'neuro') { db = dbNeuro; listId = 'list-n'; inputId = 'searchN'; }
            else if (type === 'symptom') { db = dbSymptome; listId = 'list-s'; inputId = 'searchS'; }

            const query = document.getElementById(inputId).value.toLowerCase();
            const list = document.getElementById(listId);
            list.innerHTML = "";
            if (query.trim() === "") return;

            db.filter(item => item.n.toLowerCase().includes(query) || item.g.toLowerCase().includes(query)).forEach(res => {
                const div = document.createElement('div');
                div.className = 'res-item';
                div.innerHTML = `<strong>${res.n}</strong> <small>(${res.g})</small><br>
